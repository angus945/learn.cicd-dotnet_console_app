name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish Windows x64
        run: dotnet publish src/CicdDemo/CicdDemo.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true --output artifacts/publish/win-x64

      - name: Display publish output
        run: ls -la artifacts/publish/win-x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: CicdDemo-win-x64
          path: artifacts/publish/win-x64/
          if-no-files-found: error
          retention-days: 14
