name: Release

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version without the v prefix, for example 1.1.0"
        required: true
        default: "1.1.0"
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is-release: ${{ steps.version.outputs.is-release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            TAG="$GITHUB_REF_NAME"
            IS_RELEASE="true"
          else
            TAG="v$INPUT_VERSION"
            IS_RELEASE="false"
          fi

          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid version: $TAG"
            echo "Expected format: vMAJOR.MINOR.PATCH"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is-release=$IS_RELEASE" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "Tag: $TAG"
          echo "Create release: $IS_RELEASE"

      - name: Verify commit belongs to main
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "The selected commit is not part of origin/main."
            echo "Releases and release dry runs must use main."
            exit 1
          fi

  build-test:
    name: Build and Test
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-restore
          -p:Version=${{ needs.validate.outputs.version }}
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --no-build
          --verbosity normal

  publish:
    name: Publish ${{ matrix.rid }}
    needs:
      - validate
      - build-test

    strategy:
      fail-fast: false

      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            package-format: zip

          - os: ubuntu-latest
            rid: linux-x64
            package-format: tar

          - os: macos-latest
            rid: osx-arm64
            package-format: tar

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    env:
      VERSION: ${{ needs.validate.outputs.version }}
      RID: ${{ matrix.rid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: "10.0.x"

      - name: Restore runtime dependencies
        run: >
          dotnet restore
          src/CicdDemo/CicdDemo.csproj
          --runtime ${{ matrix.rid }}

      - name: Publish application
        run: >
          dotnet publish
          src/CicdDemo/CicdDemo.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false
          -p:Version=${{ needs.validate.outputs.version }}
          -p:ContinuousIntegrationBuild=true
          --output artifacts/publish/${{ matrix.rid }}

      - name: Smoke test Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "./artifacts/publish/$env:RID/CicdDemo.exe" "Matrix $env:RID"

      - name: Smoke test Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          chmod +x "artifacts/publish/$RID/CicdDemo"
          "artifacts/publish/$RID/CicdDemo" "Matrix $RID"

      - name: Package Windows release
        if: matrix.package-format == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $publishDirectory = "artifacts/publish/$env:RID"
          $releaseDirectory = "artifacts/release"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $releaseDirectory | Out-Null

          Copy-Item README.md $publishDirectory

          $archiveName = "CicdDemo-$env:VERSION-$env:RID.zip"
          $archivePath = Join-Path $releaseDirectory $archiveName

          Compress-Archive `
            -Path "$publishDirectory/*" `
            -DestinationPath $archivePath `
            -Force

          $hash = (
            Get-FileHash $archivePath -Algorithm SHA256
          ).Hash.ToLowerInvariant()

          "$hash  $archiveName" |
            Set-Content "$archivePath.sha256" -Encoding ascii

          Get-ChildItem $releaseDirectory

      - name: Package Unix release
        if: matrix.package-format == 'tar'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/release
          cp README.md "artifacts/publish/$RID/"

          ARCHIVE="CicdDemo-${VERSION}-${RID}.tar.gz"

          tar \
            -czf "artifacts/release/$ARCHIVE" \
            -C "artifacts/publish/$RID" \
            .

          (
            cd artifacts/release
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          )

          ls -lah artifacts/release

      - name: Upload platform release
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create GitHub Release
    needs:
      - validate
      - publish

    if: needs.validate.outputs.is-release == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download platform releases
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts/release
          merge-multiple: true

      - name: Display release files
        shell: bash
        run: |
          find artifacts/release \
            -maxdepth 1 \
            -type f \
            -printf "%f\n" \
            | sort

      - name: Verify SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail

          cd artifacts/release

          CHECKSUM_COUNT=0

          for checksum in *.sha256; do
            sha256sum --check "$checksum"
            CHECKSUM_COUNT=$((CHECKSUM_COUNT + 1))
          done

          if [[ "$CHECKSUM_COUNT" -ne 3 ]]; then
            echo "Expected 3 checksum files, found $CHECKSUM_COUNT."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            artifacts/release/* \
            --verify-tag \
            --title "CicdDemo $RELEASE_TAG" \
            --generate-notes
