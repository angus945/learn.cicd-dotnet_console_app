name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $GITHUB_REF_NAME"
            echo "Expected format: vMAJOR.MINOR.PATCH, for example v1.0.0"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          echo "Release tag: $GITHUB_REF_NAME"
          echo "Application version: $VERSION"

      - name: Verify tagged commit belongs to main
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "The tagged commit is not part of origin/main."
            echo "Releases must be created from main."
            exit 1
          fi

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-restore
          -p:Version=${{ env.VERSION }}
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --no-build
          --verbosity normal

      - name: Publish Windows x64
        run: >
          dotnet publish src/CicdDemo/CicdDemo.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ env.VERSION }}
          -p:ContinuousIntegrationBuild=true
          --output artifacts/publish/win-x64

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts/release

          cp README.md artifacts/publish/win-x64/

          ARCHIVE="$GITHUB_WORKSPACE/artifacts/release/CicdDemo-${VERSION}-win-x64.zip"

          (
            cd artifacts/publish/win-x64
            zip -r "$ARCHIVE" .
          )

          (
            cd artifacts/release
            sha256sum "CicdDemo-${VERSION}-win-x64.zip" \
              > "CicdDemo-${VERSION}-win-x64.zip.sha256"
          )

          ls -lah artifacts/release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: CicdDemo-${{ github.ref_name }}-win-x64
          path: artifacts/release/
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "$GITHUB_REF_NAME" \
            artifacts/release/*.zip \
            artifacts/release/*.sha256 \
            --verify-tag \
            --title "CicdDemo $GITHUB_REF_NAME" \
            --generate-notes
